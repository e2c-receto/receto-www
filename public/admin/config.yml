backend:
  name: github
  repo: e2c-receto/receto-www
  branch: main

media_folder: public/images/blog
public_folder: /images/blog

locale: fr

collections:
  - name: settings
    label: Paramètres
    files:
      - name: contact
        label: Coordonnées
        file: src/data/contact.json
        fields:
          - { label: Email, name: email, widget: string }
          - { label: Téléphone, name: phone, widget: string }
          - { label: Téléphone international, name: phone_international, widget: string }
          - { label: WhatsApp (numéro), name: whatsapp, widget: string }
          - { label: LinkedIn, name: linkedin, widget: string }
          - { label: Instagram, name: instagram, widget: string }
          - { label: Calendly, name: calendly, widget: string }
          - { label: Formspree, name: formspree, widget: string }

  - name: faq
    label: FAQ
    files:
      - name: faq-home
        label: FAQ Accueil (7 questions)
        file: src/data/faq-home.json
        fields:
          - label: Questions
            name: items
            widget: list
            fields:
              - { label: Question, name: question, widget: string }
              - { label: Réponse, name: answer, widget: text }
      - name: faq-full
        label: FAQ Complète (par catégorie)
        file: src/data/faq.json
        fields:
          - label: Catégories
            name: categories
            widget: list
            fields:
              - { label: Titre, name: title, widget: string }
              - label: Questions
                name: items
                widget: list
                fields:
                  - { label: Question, name: question, widget: string }
                  - { label: Réponse, name: answer, widget: text }

  - name: blog
    label: Articles
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Titre, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Brouillon, name: draft, widget: boolean, default: true }
      - { label: Contenu, name: body, widget: markdown }
