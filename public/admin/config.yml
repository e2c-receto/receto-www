backend:
  name: github
  repo: e2c-receto/receto-www
  branch: main

media_folder: public/images/blog
public_folder: /images/blog

locale: fr

collections:
  - name: settings
    label: Paramètres
    files:
      - name: contact
        label: Coordonnées
        file: src/data/contact.json
        fields:
          - { label: Email, name: email, widget: string }
          - { label: Téléphone, name: phone, widget: string }
          - { label: Téléphone international, name: phone_international, widget: string }
          - { label: WhatsApp (numéro), name: whatsapp, widget: string }
          - { label: LinkedIn, name: linkedin, widget: string }
          - { label: Instagram, name: instagram, widget: string }
          - { label: Calendly, name: calendly, widget: string }
          - { label: Formspree, name: formspree, widget: string }

  - name: faq
    label: FAQ
    files:
      - name: faq-home
        label: FAQ Accueil (7 questions)
        file: src/data/faq-home.json
        fields:
          - label: Questions
            name: items
            widget: list
            fields:
              - { label: Question, name: question, widget: string }
              - { label: Réponse, name: answer, widget: text }
      - name: faq-full
        label: FAQ Complète (par catégorie)
        file: src/data/faq.json
        fields:
          - label: Catégories
            name: categories
            widget: list
            fields:
              - { label: Titre, name: title, widget: string }
              - label: Questions
                name: items
                widget: list
                fields:
                  - { label: Question, name: question, widget: string }
                  - { label: Réponse, name: answer, widget: text }

  - name: navigation
    label: Navigation
    files:
      - name: nav
        label: Menus et CTAs
        file: src/data/navigation.json
        fields:
          - label: Navigation principale
            name: mainNav
            widget: list
            fields:
              - { label: Libellé, name: label, widget: string }
              - { label: Lien, name: href, widget: string }
          - label: Boutons d'action (CTA)
            name: ctaNav
            widget: object
            fields:
              - label: Primaire
                name: primary
                widget: object
                fields:
                  - { label: Libellé, name: label, widget: string }
                  - { label: Lien, name: href, widget: string }
              - label: Secondaire
                name: secondary
                widget: object
                fields:
                  - { label: Libellé, name: label, widget: string }
                  - { label: Lien, name: href, widget: string }
          - label: Footer
            name: footerNav
            widget: object
            fields:
              - label: Produit
                name: product
                widget: list
                fields:
                  - { label: Libellé, name: label, widget: string }
                  - { label: Lien, name: href, widget: string }
              - label: Entreprise
                name: company
                widget: list
                fields:
                  - { label: Libellé, name: label, widget: string }
                  - { label: Lien, name: href, widget: string }
              - label: Juridique
                name: legal
                widget: list
                fields:
                  - { label: Libellé, name: label, widget: string }
                  - { label: Lien, name: href, widget: string }

  - name: pricing
    label: Tarifs
    files:
      - name: plans
        label: Plans tarifaires
        file: src/data/pricing.json
        fields:
          - label: Plans
            name: plans
            widget: list
            fields:
              - { label: Nom, name: name, widget: string }
              - { label: Prix (vide = gratuit), name: price, widget: number, required: false }
              - { label: Prix barré, name: originalPrice, widget: number, required: false }
              - { label: Période, name: period, widget: string, required: false }
              - { label: Description, name: description, widget: string }
              - { label: Sous-titre, name: subtitle, widget: string, required: false }
              - { label: Info annuelle, name: annualInfo, widget: string, required: false }
              - { label: Économie annuelle, name: annualSaving, widget: string, required: false }
              - { label: Mis en avant, name: featured, widget: boolean, default: false }
              - { label: Bouton — texte, name: cta_label, widget: string }
              - { label: Bouton — lien, name: cta_href, widget: string }
              - { label: Fonctionnalités actuelles, name: currentFeatures, widget: list }
              - { label: Label futur, name: futureLabel, widget: string, required: false }
              - { label: Fonctionnalités futures, name: futureFeatures, widget: list }

  - name: blog
    label: Articles
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Titre, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Brouillon, name: draft, widget: boolean, default: true }
      - { label: Contenu, name: body, widget: markdown }
