<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Kit Commercial Recèto</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Kit commercial et supports de vente Recèto - ECO2CHEF">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #155DFC;
    }
    .sidebar {
      padding-top: 20px;
    }
    .app-name-link {
      font-weight: bold;
    }
    /* Écran de protection */
    .password-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #155DFC 0%, #0f47c7 50%, #0a2e7a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .password-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .password-box h2 {
      margin: 0 0 4px 0;
      color: #155DFC;
      font-size: 26px;
    }
    .password-box .subtitle {
      color: #999;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .password-box p.desc {
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .password-box input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    .password-box input:focus {
      border-color: #155DFC;
      outline: none;
    }
    .password-box button {
      width: 100%;
      padding: 12px;
      background: #155DFC;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .password-box button:hover {
      background: #0f47c7;
    }
    .password-error {
      color: #e74c3c;
      margin-top: 10px;
      display: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Écran de protection par mot de passe -->
  <div id="password-screen" class="password-overlay">
    <div class="password-box">
      <h2>Recèto</h2>
      <div class="subtitle">ECO2CHEF</div>
      <p class="desc">Kit commercial — Accès réservé</p>
      <input type="password" id="password-input" placeholder="Mot de passe" onkeypress="if(event.key==='Enter')checkPassword()">
      <button onclick="checkPassword()">Accéder</button>
      <p class="password-error" id="password-error">Mot de passe incorrect</p>
    </div>
  </div>

  <div id="app" style="display:none;">Chargement...</div>

  <script>
    const PASSWORD = 'receto2026';

    function checkPassword() {
      const input = document.getElementById('password-input').value;
      if (input === PASSWORD) {
        sessionStorage.setItem('receto_kit_auth', 'true');
        showContent();
      } else {
        document.getElementById('password-error').style.display = 'block';
        document.getElementById('password-input').value = '';
      }
    }

    function showContent() {
      document.getElementById('password-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    if (sessionStorage.getItem('receto_kit_auth') === 'true') {
      showContent();
    }
  </script>
  <script>
    window.$docsify = {
      name: 'Kit Commercial Recèto',
      repo: '',
      loadSidebar: '_sidebar.md',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,
      search: {
        placeholder: 'Rechercher...',
        noData: 'Aucun résultat',
        paths: 'auto',
        depth: 3
      },
      auto2top: true,
      homepage: 'README.md',
      relativePath: true,
      notFoundPage: true
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
